<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fused Retrieval Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background:#f6f7f8; color:#1f2528; }
    .app { max-width: 1280px; margin: 0 auto; padding: 16px; }
    .card { background:#fff; border:1px solid #d7dee2; border-radius:8px; padding:14px; margin-bottom:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input, button { padding:8px; border-radius:6px; border:1px solid #cdd5da; }
    button { cursor:pointer; background:#0f766e; color:white; border-color:#0f766e; }
    button.secondary { background:white; color:#0f766e; }
    .metrics { display:grid; grid-template-columns: repeat(4,minmax(120px,1fr)); gap:8px; }
    .metric { background:#fff; border:1px solid #d7dee2; border-radius:8px; padding:10px; }
    .metric .k { color:#637078; font-size:12px; }
    .metric .v { font-weight:700; font-size:18px; }
    table { width:100%; border-collapse: collapse; font-size:13px; }
    th, td { border-bottom:1px solid #e2e7ea; padding:6px; text-align:left; }
    .muted { color:#637078; }
    .status { margin:8px 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const e = React.createElement;

    const metricLabelMap = {
      accuracy_at_1: "Accuracy",
      precision_at_k: "Precision",
      recall_at_k: "Recall",
      f1_at_k: "F1-score",
      mrr_at_k: "MRR",
      ndcg_at_k: "nDCG",
      topk_hit_rate: "Top-k hit rate",
      hallucination_rate: "Hallucination rate",
    };

    function fmt(v) {
      if (v === null || v === undefined || v === "") return "-";
      if (typeof v === "number") return Number(v).toFixed(4);
      const asNum = Number(v);
      if (!Number.isNaN(asNum) && String(v).trim() !== "") return asNum.toFixed(4);
      return String(v);
    }

    function MetricCards({ title, data }) {
      if (!data || Object.keys(data).length === 0) return e("div", { className: "muted" }, title + " 없음");
      const fields = ["accuracy_at_1","precision_at_k","recall_at_k","f1_at_k","mrr_at_k","ndcg_at_k","topk_hit_rate","hallucination_rate"];
      return e("div", null,
        e("h3", null, title),
        e("div", { className:"metrics" },
          ...fields.map((k) =>
            e("div", { className:"metric", key:k },
              e("div", { className:"k" }, metricLabelMap[k] || k),
              e("div", { className:"v" }, fmt(data[k]))
            )
          )
        )
      );
    }

    function DataTable({ title, table }) {
      if (!table || !Array.isArray(table.columns) || !Array.isArray(table.rows)) {
        return e("div", { className: "card" }, e("h3", null, title), e("div", { className: "muted" }, "데이터 없음"));
      }
      return e("div", { className:"card" },
        e("h3", null, title),
        e("div", { style:{ overflow:"auto" } },
          e("table", null,
            e("thead", null, e("tr", null, ...table.columns.map((c)=>e("th",{key:c},c)))),
            e("tbody", null, ...table.rows.map((r,i)=>e("tr",{key:i}, ...table.columns.map((c)=>e("td",{key:c}, fmt(r[c]))))))
          )
        )
      );
    }

    function SearchPanel({ query, setQuery, runSearch, debug, setDebug }) {
      return e("div", { className: "row" },
        e("input", {
          style: { flex: "1 1 420px" },
          value: query,
          onChange: (ev) => setQuery(ev.target.value),
          placeholder: "검색어 입력",
        }),
        e("button", { onClick: runSearch }, "검색 실행"),
        e("button", { className: "secondary", onClick: () => setDebug(!debug) }, debug ? "Debug 숨김" : "Debug 보기")
      );
    }

    function UploadPanel({ setQuery, setStatus }) {
      const [file, setFile] = React.useState(null);
      const upload = async () => {
        if (!file) { setStatus("업로드할 파일을 선택하세요."); return; }
        setStatus("업로드 및 STT 처리 중...");
        const fd = new FormData();
        fd.append("file", file);
        const resp = await fetch("/api/upload", { method:"POST", body: fd });
        const d = await resp.json();
        if (!d.ok) { setStatus(d.error || "업로드 실패"); return; }
        setStatus("업로드 완료: " + (d.title || d.docId || ""));
        if (d.searchQuery) setQuery(d.searchQuery);
      };
      return e("div", { className: "row" },
        e("input", { type:"file", accept:".mp4,.wav,video/mp4,audio/wav,audio/x-wav", onChange:(ev)=>setFile(ev.target.files?.[0] || null) }),
        e("button", { className: "secondary", onClick: upload }, "파일 업로드")
      );
    }

    function App() {
      const [query, setQuery] = React.useState("");
      const [status, setStatus] = React.useState("초기화 중...");
      const [options, setOptions] = React.useState(null);
      const [result, setResult] = React.useState(null);
      const [debug, setDebug] = React.useState(false);

      React.useEffect(() => {
        fetch("/api/options")
          .then((r) => r.json())
          .then((d) => {
            setOptions(d);
            setStatus("준비 완료");
          })
          .catch((err) => setStatus("초기화 실패: " + String(err)));
      }, []);

      const runSearch = async () => {
        if (!query.trim()) { setStatus("검색어를 입력하세요."); return; }
        setStatus("검색 중...");
        const resp = await fetch("/api/search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, debugMode: debug }),
        });
        const d = await resp.json();
        if (!d.ok) { setStatus(d.error || "검색 실패"); return; }
        setResult(d);
        setStatus("검색 완료");
      };

      const device = result?.device?.device || options?.device?.device || "unknown";
      const docCount = result?.dataset?.documentCount ?? options?.documentCount ?? 0;

      return e("div", { className: "app" },
        e("div", { className: "card" },
          e("h2", null, "Fused 단일 검색 모델"),
          e(SearchPanel, { query, setQuery, runSearch, debug, setDebug }),
          e("div", { style: { height: "8px" } }),
          e(UploadPanel, { setQuery, setStatus }),
          e("div", { className: "status muted" }, status),
          e("div", { className: "muted" }, "Device: " + device + " | 문서 수: " + docCount)
        ),
        result ? e("div", null,
          e("div", { className: "card" },
            e("h3", null, "최종 Fused 결과"),
            e("div", { className: "muted" }, result.relevantSummary || ""),
            e("div", { className: "muted" }, "BM25 + MiniLM + E5 정규화 및 adaptive 가중치 기반 단일 결과")
          ),
          e("div", { className: "card" },
            e(MetricCards, { title: "현재 질의 기준 Fused 성능 요약", data: result.fusedCurrentMetrics }),
            e("div", { style: { height: "12px" } }),
            e(MetricCards, { title: "전체 데이터셋 기준 Fused 누적 성능 요약", data: result.fusedGlobalMetrics })
          ),
          e(DataTable, { title: "Fused Top-K 결과", table: result.tables?.fused }),
          e(DataTable, { title: "Explainability / Fusion Weights", table: result.fusedExplainability }),
          debug ? e("div", null,
            e(DataTable, { title: "BM25 (Debug)", table: result.tables?.keyword }),
            e(DataTable, { title: "MiniLM (Debug)", table: result.tables?.denseA }),
            e(DataTable, { title: "E5 (Debug)", table: result.tables?.denseB })
          ) : null
        ) : null
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>

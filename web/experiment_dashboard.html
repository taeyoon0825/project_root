<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fused Retrieval Dashboard</title>
  <link rel="icon" href="/web/favicon.svg" type="image/svg+xml">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg: #f3f5f7;
      --panel: #ffffff;
      --line: #d8e0e6;
      --text: #1d2730;
      --muted: #66737d;
      --brand: #0f766e;
      --brand-soft: #d9f3ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7fafb 0%, #eef3f6 100%);
      color: var(--text);
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(23, 42, 58, 0.04);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .hero h1,
    .card h2,
    .card h3 {
      margin: 0 0 12px;
    }

    .hero p,
    .muted {
      color: var(--muted);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input,
    button {
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 10px 12px;
      font: inherit;
    }

    input[type="text"],
    input[type="search"],
    input[type="file"] {
      background: #fff;
    }

    button {
      cursor: pointer;
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      font-weight: 600;
    }

    button.secondary {
      background: #fff;
      color: var(--brand);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .status {
      margin-top: 10px;
      padding: 10px 12px;
      background: var(--brand-soft);
      border-radius: 10px;
      color: #124b45;
      font-size: 14px;
    }

    .meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
      color: var(--muted);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fbfcfd;
    }

    .metric-key {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 18px;
      font-weight: 700;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .summary-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fbfcfd;
    }

    .summary-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .table-wrap {
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      border-bottom: 1px solid #e5ebef;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      background: #f8fafb;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .app {
        padding: 12px;
      }

      .hero {
        display: block;
      }

      .hero p {
        margin-top: 0;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const h = React.createElement;

    const metricLabelMap = {
      accuracy_at_1: "Accuracy@1",
      precision_at_k: "Precision@K",
      recall_at_k: "Recall@K",
      f1_at_k: "F1@K",
      mrr_at_k: "MRR@K",
      ndcg_at_k: "nDCG@K",
      topk_hit_rate: "Top-K Hit Rate",
      hallucination_rate: "Hallucination Rate",
    };

    const columnLabelMap = {
      rank: "Rank",
      file_name: "Document",
      relative_match_score: "Relative Match",
      normalized_relevance_score: "Normalized Relevance",
      ranking_confidence_score: "Ranking Confidence",
      matched_tokens: "Matched Tokens",
      title_match_count: "Title Matches",
      description_match_count: "Description Matches",
      tags_match_count: "Tag Matches",
      transcript_match_count: "Transcript Matches",
      lexical_score: "Lexical Score",
      semantic_score: "Semantic Score",
      final_score: "Final Score",
      reason: "Reason",
      precision: "Precision",
      recall: "Recall",
      f1_score: "F1",
      accuracy: "Accuracy",
      hallucination_flag: "Hallucination",
      search_location: "Location",
      query_preview: "Preview",
    };

    const explainabilityLabelMap = {
      id: "Doc ID",
      bm25_score: "BM25",
      minilm_score: "MiniLM",
      e5_score: "E5",
      normalized_bm25: "Norm BM25",
      normalized_minilm: "Norm MiniLM",
      normalized_e5: "Norm E5",
      fused_score: "Fused Score",
      reranker_score: "Reranker",
      reranker_alpha: "Reranker Alpha",
      rerank_anchor_overlap: "Anchor Overlap",
      reranker_enabled: "Reranker Enabled",
      dense_normalization_mode: "Dense Norm Mode",
      query_normalization_mode: "Query Norm Mode",
      adaptive_candidate_pool_k: "Adaptive Candidate Pool",
      adaptive_rerank_top_n: "Adaptive Rerank TopN",
      adaptive_query_bucket: "Query Bucket",
      adaptive_semantic_need: "Semantic Need",
      adaptive_ambiguity: "Ambiguity",
      adaptive_reranker_value: "Adaptive Reranker",
      fusion_weights: "Fusion Weights",
      top_model_contribution: "Top Contribution",
      used_fallback_tuning: "Used Fallback",
      fallback_reason: "Fallback Reason",
      chosen_preview_reason: "Preview Reason",
      ranking_reason: "Ranking Reason",
    };

    function formatValue(value) {
      if (value === null || value === undefined || value === "") return "-";
      if (typeof value === "number") return Number(value).toFixed(4);

      const asNumber = Number(value);
      if (!Number.isNaN(asNumber) && String(value).trim() !== "") {
        return asNumber.toFixed(4);
      }
      return String(value);
    }

    function labelForColumn(column) {
      return columnLabelMap[column] || explainabilityLabelMap[column] || column;
    }

    function MetricCards(props) {
      const title = props.title;
      const data = props.data;
      if (!data || Object.keys(data).length === 0) {
        return h("div", { className: "empty" }, title + ": no data");
      }

      const fields = [
        "accuracy_at_1",
        "precision_at_k",
        "recall_at_k",
        "f1_at_k",
        "mrr_at_k",
        "ndcg_at_k",
        "topk_hit_rate",
        "hallucination_rate",
      ];

      return h("div", null,
        h("h3", null, title),
        h("div", { className: "metrics" },
          ...fields.map((key) =>
            h("div", { className: "metric", key: key },
              h("div", { className: "metric-key" }, metricLabelMap[key] || key),
              h("div", { className: "metric-value" }, formatValue(data[key]))
            )
          )
        )
      );
    }

    function DataTable(props) {
      const title = props.title;
      const table = props.table;
      if (!table || !Array.isArray(table.columns) || !Array.isArray(table.rows) || table.columns.length === 0) {
        return h("div", { className: "card" },
          h("h3", null, title),
          h("div", { className: "empty" }, "No data")
        );
      }

      return h("div", { className: "card" },
        h("h3", null, title),
        h("div", { className: "table-wrap" },
          h("table", null,
            h("thead", null,
              h("tr", null,
                ...table.columns.map((column) =>
                  h("th", { key: column }, labelForColumn(column))
                )
              )
            ),
            h("tbody", null,
              ...table.rows.map((row, rowIndex) =>
                h("tr", { key: rowIndex },
                  ...table.columns.map((column) =>
                    h("td", { key: column }, formatValue(row[column]))
                  )
                )
              )
            )
          )
        )
      );
    }

    function SearchPanel(props) {
      const query = props.query;
      const setQuery = props.setQuery;
      const runSearch = props.runSearch;
      const debug = props.debug;
      const setDebug = props.setDebug;
      const loading = props.loading;

      return h("div", { className: "row" },
        h("input", {
          type: "search",
          style: { flex: "1 1 420px" },
          value: query,
          onChange: (event) => setQuery(event.target.value),
          placeholder: "Enter search text",
        }),
        h("button", { onClick: runSearch, disabled: loading }, loading ? "Searching..." : "Search"),
        h("button", {
          className: "secondary",
          onClick: () => setDebug(!debug),
          disabled: loading,
        }, debug ? "Debug On" : "Debug Off")
      );
    }

    function UploadPanel(props) {
      const setQuery = props.setQuery;
      const setStatus = props.setStatus;
      const loading = props.loading;
      const [file, setFile] = React.useState(null);

      const upload = async () => {
        if (!file) {
          setStatus("Choose an MP4 or WAV file first.");
          return;
        }

        setStatus("Uploading file and running STT...");
        try {
          const formData = new FormData();
          formData.append("file", file);
          const response = await fetch("/api/upload", {
            method: "POST",
            body: formData,
          });
          const data = await response.json();
          if (!data.ok) {
            setStatus(data.error || "Upload failed.");
            return;
          }

          setStatus("Upload complete: " + (data.title || data.docId || file.name));
          if (data.searchQuery) {
            setQuery(data.searchQuery);
          }
        } catch (error) {
          setStatus("Upload failed: " + String(error));
        }
      };

      return h("div", { className: "row" },
        h("input", {
          type: "file",
          accept: ".mp4,.wav,video/mp4,audio/wav,audio/x-wav",
          onChange: (event) => setFile(event.target.files && event.target.files[0] ? event.target.files[0] : null),
        }),
        h("button", { className: "secondary", onClick: upload, disabled: loading }, "Upload")
      );
    }

    function SummaryPanel(props) {
      const selection = props.selection;
      if (!selection) return null;

      return h("div", { className: "card" },
        h("h3", null, "Final Fused Result"),
        h("div", { className: "summary-grid" },
          h("div", { className: "summary-item" },
            h("strong", null, "Document"),
            h("div", null, selection.file_name || "-")
          ),
          h("div", { className: "summary-item" },
            h("strong", null, "Relative Match"),
            h("div", null, formatValue(selection.relative_match_score))
          ),
          h("div", { className: "summary-item" },
            h("strong", null, "Normalized Relevance"),
            h("div", null, formatValue(selection.normalized_relevance_score))
          ),
          h("div", { className: "summary-item" },
            h("strong", null, "Ranking Confidence"),
            h("div", null, formatValue(selection.ranking_confidence_score))
          ),
          h("div", { className: "summary-item" },
            h("strong", null, "Preview"),
            h("div", null, selection.preview || "-")
          ),
          h("div", { className: "summary-item" },
            h("strong", null, "Ranking Reason"),
            h("div", null, selection.ranking_reason || "-")
          )
        )
      );
    }

    function App() {
      const [query, setQuery] = React.useState("");
      const [status, setStatus] = React.useState("Loading dashboard...");
      const [options, setOptions] = React.useState(null);
      const [result, setResult] = React.useState(null);
      const [debug, setDebug] = React.useState(false);
      const [loading, setLoading] = React.useState(false);

      React.useEffect(() => {
        fetch("/api/options")
          .then((response) => response.json())
          .then((data) => {
            setOptions(data);
            setStatus("Ready.");
          })
          .catch((error) => {
            setStatus("Failed to load options: " + String(error));
          });
      }, []);

      const runSearch = async () => {
        if (!query.trim()) {
          setStatus("Enter a query first.");
          return;
        }

        setLoading(true);
        setStatus("Searching...");

        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 90000);
          const startedAt = performance.now();

          const response = await fetch("/api/search", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              query: query,
              debugMode: debug,
              includeDetails: debug,
            }),
            signal: controller.signal,
          });

          clearTimeout(timeout);
          const data = await response.json();
          if (!data.ok) {
            setStatus(data.error || "Search failed.");
            setLoading(false);
            return;
          }

          setResult(data);
          setStatus("Search complete (" + Math.round(performance.now() - startedAt) + "ms)");
        } catch (error) {
          if (error && error.name === "AbortError") {
            setStatus("Search timed out after 90 seconds.");
          } else {
            setStatus("Search failed: " + String(error));
          }
        } finally {
          setLoading(false);
        }
      };

      const device = (result && result.device && result.device.device) || (options && options.device && options.device.device) || "unknown";
      const documentCount = (result && result.dataset && result.dataset.documentCount) ?? (options && options.documentCount) ?? 0;

      return h("div", { className: "app" },
        h("div", { className: "card hero" },
          h("div", null,
            h("h1", null, "Fused Retrieval Dashboard"),
            h("p", { className: "muted" }, "React UMD frontend served by the local Python API.")
          ),
          h("div", { className: "meta" },
            h("span", null, "Device: " + device),
            h("span", null, "Documents: " + documentCount)
          )
        ),
        h("div", { className: "card" },
          h("h2", null, "Search"),
          h(SearchPanel, {
            query: query,
            setQuery: setQuery,
            runSearch: runSearch,
            debug: debug,
            setDebug: setDebug,
            loading: loading,
          }),
          h("div", { style: { height: "10px" } }),
          h(UploadPanel, {
            setQuery: setQuery,
            setStatus: setStatus,
            loading: loading,
          }),
          h("div", { className: "status" }, status)
        ),
        result ? h("div", null,
          h(SummaryPanel, { selection: result.finalFusedSelection }),
          debug ? h("div", { className: "card" },
            h(MetricCards, { title: "Current Query Metrics", data: result.fusedCurrentMetrics }),
            h("div", { style: { height: "14px" } }),
            h(MetricCards, { title: "Global Fused Metrics", data: result.fusedGlobalMetrics })
          ) : null,
          h(DataTable, { title: "Fused Top-K Results", table: result.tables && result.tables.fused }),
          h(DataTable, { title: "Explainability / Fusion Weights", table: result.fusedExplainability }),
          debug ? h("div", null,
            h("div", { className: "card" },
              h("h3", null, "Evaluation Status"),
              h("p", { className: "muted" }, result.relevantSummary || "No relevant summary."),
              h("p", { className: "muted" }, result.evaluationStatus && result.evaluationStatus.message ? result.evaluationStatus.message : "No evaluation message."),
              h("p", { className: "muted" }, "Has ground truth: " + String(result.evaluationStatus && result.evaluationStatus.has_ground_truth))
            ),
            h(DataTable, { title: "BM25 Debug", table: result.tables && result.tables.keyword }),
            h(DataTable, { title: "MiniLM Debug", table: result.tables && result.tables.denseA }),
            h(DataTable, { title: "E5 Debug", table: result.tables && result.tables.denseB })
          ) : null
        ) : null
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
